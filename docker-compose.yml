services:
  mongodb:
    image: mongo:8
    container_name: mongodb
    restart: always
    ports:
       - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qrbharat-backend
    restart: always
    ports:
      - "5002:5000"
    env_file:
      - ./backend/.env.docker
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/qrbharat
      REDIS_URL: redis://redis:6379
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5002/api/v1
        NEXT_PUBLIC_SOCKET_URL: http://localhost:5002
    container_name: qrbharat-frontend
    restart: always
    ports:
      - "5001:3000"
    depends_on:
      - backend

volumes:
  mongodb_data:
  redis_data: