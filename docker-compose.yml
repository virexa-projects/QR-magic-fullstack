services:

  mongodb:
    image: mongo:8
    container_name: qrbharat-mongodb
    restart: always
    ports:
    - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 5s
      timeout: 5s
      retries: 10


  redis:
    image: redis:7-alpine
    container_name: qrbharat-redis
    restart: always
    volumes:
      - redis_data:/data


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qrbharat-backend
    restart: always

    env_file:
      - ./backend/.env.docker

    environment:
      NODE_ENV: production
      PORT: 5000

      MONGO_URI: mongodb://mongodb:27017/qrbharatDocker
      REDIS_URL: redis://redis:6379

    expose:
      - "5000"

    depends_on:
      mongodb:
        condition: service_healthy

      redis:
        condition: service_started


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

      args:
        NEXT_PUBLIC_API_URL: /api/v1
        NEXT_PUBLIC_SOCKET_URL: ""

    container_name: qrbharat-frontend
    restart: always

    expose:
      - "3000"

    depends_on:
      - backend


  nginx:
    image: nginx:alpine
    container_name: qrbharat-nginx
    restart: always

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      - frontend
      - backend


volumes:
  mongodb_data:
  redis_data: